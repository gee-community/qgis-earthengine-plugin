name: QGIS Plugin CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  tests:
    runs-on: ubuntu-latest
    container:
      image: qgis/qgis:${{ matrix.qgis-image }}
    strategy:
      matrix:
        include:
          - qgis-image: "3.44"
            label: "QGIS 3.x (Qt5)"
          - qgis-image: "4.0-trixie"
            label: "QGIS 4.x (Qt6)"
      fail-fast: false

    name: "${{ matrix.label }}"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Create virtualenv and install dependencies
        run: |
          uv venv --system-site-packages
          uv pip install -r requirements-dev.txt

      - name: Configure Earth Engine Credentials
        run: |
          mkdir -p ~/.config/earthengine
          echo '${{ secrets.EE_CREDENTIALS_JSON }}' > ~/.config/earthengine/credentials

      - name: Run pre-commit checks
        run: |
          .venv/bin/pre-commit run --all-files

      - name: Run tests with coverage
        run: >
          xvfb-run -s '+extension GLX -screen 0 1024x768x24'
          .venv/bin/pytest --cov=. --cov-report=html --cov-report=term-missing test/

      - name: Upload coverage report
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ strategy.job-index }}
          path: htmlcov/
